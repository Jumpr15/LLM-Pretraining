# hf 
dataset_ckpt: openbmb/Ultra-FineWeb
dataset_split: en
text_column: content
stream_dataset: true
tokenizer_ckpt: HuggingFaceTB/SmolLM-1.7B

save_ckpt: model_ckpts
pretrain_ckpt: model_pretrain.ckpt
enable_liger_kernel: true

hf_bucket_name: Jumpr/67
hf_bucket_save_dir: model_ckpts/pretraining/run_v1/model_weights

# wandb + lightning callback
wandb_run_name: run_v1
wandb_run_project: lightningmodel_pretraining
save_every_n_train_steps: 2500
save_top_k: -1
log_every_n_steps: 5

# lightning trainer parameters
precision: bf16-true
gradient_clip_val: 1.0
devices: 1

# training hyperparameters 
batch_size: 36 
batch_acc: 4
lr: 2.5e-4
iterations: 280000
max_epochs: 1
num_workers: 1

# model parameterds
seq_len: 1024
embed_dims: 1024
head_size: 64
num_heads: 16
block_num: 28
vocab_size: 49152